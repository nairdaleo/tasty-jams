<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon-32.png"
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spark – Support · Tasty Jam</title>
    <meta
      name="description"
      content="Get help with Spark, the ADHD habit tracker with forgiving streaks."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/shared.css" />
  </head>
  <body>
    <div class="container">
      <nav id="tj-nav" data-app="spark" data-page="support"></nav>

      <div class="header">
        <div class="header-icon">
          <img src="/assets/spark-icon.png" alt="Spark icon" />
        </div>
        <h1>Spark</h1>
        <p class="tagline">
          ADHD Habit Tracker — Build routines without the shame spiral
        </p>
        <div style="margin-top: 24px">
          <a
            href="https://apps.apple.com/app/spark-adhd-habit-tracker/id6760031434"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              src="/assets/app-store-badge-black.svg"
              alt="Download on the App Store"
              style="height: 40px"
            />
          </a>
        </div>
      </div>

      <div class="section">
        <h2 class="section-title" id="faq-title">Frequently Asked Questions</h2>
        <div id="faq-items"></div>
      </div>

      <div class="section">
        <h2 class="section-title" id="contact-title">Contact Support</h2>
        <div id="msgOk" class="msg msg-ok"></div>
        <div id="msgErr" class="msg msg-err"></div>
        <form id="contact-form" method="POST">
          <input type="hidden" name="app" value="Spark" />
          <div class="form-group">
            <label for="name" id="label-name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              required
              placeholder="Your name"
            />
          </div>
          <div class="form-group">
            <label for="email" id="label-email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              placeholder="your@email.com"
            />
          </div>
          <div class="form-group">
            <label for="subject" id="label-subject">Subject</label>
            <select id="subject" name="subject">
              <option id="opt-bug">Bug report</option>
              <option id="opt-sub">Subscription issue</option>
              <option id="opt-feature">Feature request</option>
              <option id="opt-general">General question</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message" id="label-message">Message</label>
            <textarea
              id="message"
              name="message"
              required
              placeholder="Describe your issue or question..."
            ></textarea>
          </div>
          <button type="submit">Send message</button>
        </form>
      </div>

      <script>
        document.addEventListener('DOMContentLoaded', () => {
          // Wait for i18n to load
          const checkI18n = setInterval(() => {
            if (window.tj && window.tj.i18n) {
              clearInterval(checkI18n);

              // Update FAQ
              const faqTitle = document.getElementById('faq-title');
              const faqItems = document.getElementById('faq-items');
              const msgOk = document.getElementById('msgOk');
              const msgErr = document.getElementById('msgErr');

              faqTitle.textContent = t('spark.faq.title');

              const faqData = t('spark.faq');
              let faqHtml = '';
              for (let i = 1; i <= 6; i++) {
                const q = faqData[`q${i}`];
                const a = faqData[`a${i}`];
                if (q && a) {
                  faqHtml += `<div class="faq-item"><div class="faq-q">${q}</div><div class="faq-a">${a}</div></div>`;
                }
              }
              faqItems.innerHTML = faqHtml;

              // Update contact form
              document.getElementById('contact-title').textContent = t('spark.contactForm.title');
              document.getElementById('label-name').textContent = t('spark.contactForm.nameLabel');
              document.getElementById('name').placeholder = t('spark.contactForm.namePlaceholder');
              document.getElementById('label-email').textContent = t('spark.contactForm.emailLabel');
              document.getElementById('email').placeholder = t('spark.contactForm.emailPlaceholder');
              document.getElementById('label-subject').textContent = t('spark.contactForm.subjectLabel');
              document.getElementById('label-message').textContent = t('spark.contactForm.messageLabel');
              document.getElementById('message').placeholder = t('spark.contactForm.messagePlaceholder');
              document.querySelector('button[type="submit"]').textContent = t('spark.contactForm.submitBtn');

              document.getElementById('opt-bug').textContent = t('spark.contactForm.bugReport');
              document.getElementById('opt-sub').textContent = t('spark.contactForm.subscriptionIssue');
              document.getElementById('opt-feature').textContent = t('spark.contactForm.featureRequest');
              document.getElementById('opt-general').textContent = t('spark.contactForm.generalQuestion');

              msgOk.textContent = t('spark.contactForm.successMsg');
              msgErr.textContent = t('spark.contactForm.errorMsg');
            }
          }, 50);
        });
      </script>

      <div id="tj-footer"></div>
    </div>
    <script src="/js/shared.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        injectFooter({
          links: [
            { href: "/spark/privacy.html", text: window.tj ? t('common.privacyPolicy', 'Privacy Policy') : 'Privacy Policy' },
            { href: "/", text: window.tj ? t('common.allApps', 'All Apps') : 'All Apps' },
            { href: `mailto:support@tastyjam.ca`, text: window.tj ? t('common.email', 'support@tastyjam.ca') : 'support@tastyjam.ca' },
          ],
        });
      });
    </script>
  </body>
</html>
